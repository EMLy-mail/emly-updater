name: Build EMLy Updater

on:
  push:
    branches: [master]
  pull_request:
    branches: [stable]
  workflow_dispatch:

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Build EMLy Updater
        run: go build -ldflags "-s -w" -o build\EMLyUpdater.exe .

      - name: Decode signing certificate
        env:
          CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}
        run: |
          $bytes = [Convert]::FromBase64String("$env:CODE_SIGN_PFX")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $bytes)

      - name: Sign EMLyUpdater.exe
        env:
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -Last 1).FullName
          & $signtool sign /f "$env:RUNNER_TEMP\codesign.pfx" /p "$env:CODE_SIGN_PASSWORD" `
            /fd sha256 /tr http://timestamp.digicert.com /td sha256 build\EMLyUpdater.exe

      - name: Compile installer
        env:
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -Last 1).FullName
          $sign = "$signtool sign /f `$q$env:RUNNER_TEMP\codesign.pfx`$q /p `$q$env:CODE_SIGN_PASSWORD`$q /fd sha256 /tr http://timestamp.digicert.com /td sha256 `$f"
          iscc "/Ssigntool=$sign" installer\installer.iss

      - name: Sign installer
        env:
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -Last 1).FullName
          $installer = (Get-ChildItem installer\Output\EMLyUpdater_Installer_*.exe | Select-Object -First 1).FullName
          & $signtool sign /f "$env:RUNNER_TEMP\codesign.pfx" /p "$env:CODE_SIGN_PASSWORD" `
            /fd sha256 /tr http://timestamp.digicert.com /td sha256 $installer

      - name: Remove certificate
        if: always()
        run: Remove-Item "$env:RUNNER_TEMP\codesign.pfx" -ErrorAction SilentlyContinue

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: EMLy-Updater-Installer
          path: installer\Output\EMLyUpdater_Installer_*.exe
          if-no-files-found: error
