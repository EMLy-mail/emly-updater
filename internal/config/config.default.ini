[updater]
; Cartella di installazione di EMLy. Usata per individuare l'eseguibile
; e per riparare le associazioni file dopo un aggiornamento.
emlyInstallDir       = C:\3gIT\EMLy

; Nome dell'eseguibile di EMLy. Usato per verificare se EMLy è in esecuzione
; e, se necessario, terminarlo prima di applicare un aggiornamento forzato.
emlyExeName          = EMLy.exe

; Percorso del file config.ini di EMLy. L'updater lo legge per conoscere
; la versione installata, il canale di aggiornamento e la lingua dell'interfaccia.
emlyConfigFile       = C:\3gIT\EMLy\config.ini

; Intervallo di controllo aggiornamenti, espresso in minuti (minimo 1).
; Ogni ciclo l'updater scarica il manifest e confronta la versione disponibile
; con quella installata.
pollIntervalMinutes  = 30

; Forza il canale di aggiornamento indipendentemente da quello impostato in EMLy.
; Lasciare vuoto per seguire GUI_RELEASE_CHANNEL dal config.ini di EMLy.
; Valori ammessi: vuoto, "stable", "beta".
channelOverride      =

[source]
; Sorgente primaria per il manifest degli aggiornamenti.
; "external" = HTTPS pubblico (API EMLy su Internet).
; "internal" = HTTP su rete locale (server interno).
; Se la sorgente primaria non risponde, l'updater passa automaticamente
; alla condivisione UNC come fallback.
primary              = external

; URL del manifest usato quando primary = external.
externalManifestURL  = https://api.emly.ffois.it/v2/updates/manifest

; URL del manifest usato quando primary = internal.
; Obbligatorio solo se primary = internal; lasciare vuoto altrimenti.
internalManifestURL  = http://172.16.96.73:8080/v2/updates/manifest

; Percorso UNC della condivisione di rete usata come fallback.
; Il manifest viene letto da <uncRoot>\version.json.
; Il setup viene scaricato da <uncRoot>\<versione>\setup.exe.
uncRoot              = \\dc-rm2\logo\update

; User-Agent inviato nelle richieste HTTP verso il manifest e il download.
; Identifica il client presso le API EMLy.
userAgent            = EMLy-Updater/0.3.0b (f.fois@3git.eu)

; Chiave API inviata come header X-Api-Key nelle richieste HTTP.
; Lasciare vuoto se non richiesta dal server.
xApiKey              = emly_1BaQdBknsMGcY5DynSby71JnWOKXtJvnuUprkgWT0pujpLFxj5HaTXP9vtJAMk63

[fileAssociations]
; ProgID registrato nel registro di Windows per i file .eml gestiti da EMLy.
progIdEml = EMLy.EML

; ProgID registrato nel registro di Windows per i file .msg gestiti da EMLy.
progIdMsg = EMLy.MSG

[criticalUpdate]
; Abilita la finestra di avviso mostrata agli utenti prima di terminare EMLy
; in caso di aggiornamento forzato (forced = true nel manifest).
criticalWarningEnabled = true

; Secondi di attesa dopo la chiusura della finestra di avviso, prima di
; terminare il processo EMLy e avviare l'installazione.
criticalWarningSeconds = 30
