[updater]
emlyInstallDir       = C:\3gIT\EMLy
emlyExeName          = EMLy.exe
; source of installed version / channel / language
emlyConfigFile       = C:\3gIT\EMLy\config.ini
pollIntervalMinutes  = 30
; empty = follow EMLy's GUI_RELEASE_CHANNEL; or force "stable" / "beta"
channelOverride      =

[source]
; primary update-info source: "external" (public HTTPS) or "internal" (LAN HTTP).
; If the primary source fails, the updater falls back to the UNC share.
primary              = external
externalManifestURL  = https://api-beta.emly.ffois.it/v2/updates/manifest
; required only when primary = internal
internalManifestURL  =
; fallback only; manifest is read from <uncRoot>\version.json
uncRoot              = \\dc-rm2\logo\update
; optional headers for HTTP manifest/download requests
userAgent            = EMLy-Updater/0.2.1a (f.fois@3git.eu)
xApiKey              =

[fileAssociations]
progIdEml = EMLy.EML
progIdMsg = EMLy.MSG

[criticalUpdate]
criticalWarningEnabled = true
criticalWarningSeconds = 30
; warning text language follows EMLy's LANGUAGE key, fallback "en"
